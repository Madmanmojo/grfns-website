<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="16" height="16" fill="#0a0a0f"/>

  <!-- Wing (top sweep) -->
  <rect x="4" y="0" width="3" height="1" fill="#ff2d78"/>
  <rect x="3" y="1" width="5" height="1" fill="#ff2d78"/>
  <rect x="2" y="2" width="7" height="1" fill="#ff2d78"/>
  <rect x="1" y="3" width="9" height="1" fill="#ff2d78"/>
  <rect x="0" y="4" width="9" height="1" fill="#ff2d78"/>

  <!-- Head + neck -->
  <rect x="0" y="5" width="4" height="1" fill="#ff2d78"/>
  <rect x="5" y="5" width="3" height="1" fill="#ff2d78"/>
  <rect x="0" y="6" width="6" height="1" fill="#ff2d78"/>
  <rect x="1" y="7" width="5" height="1" fill="#ff2d78"/>
  <rect x="1" y="8" width="4" height="1" fill="#ff2d78"/>

  <!-- Body -->
  <rect x="2" y="9"  width="4" height="1" fill="#ff2d78"/>
  <rect x="2" y="10" width="5" height="1" fill="#ff2d78"/>

  <!-- Legs -->
  <rect x="2" y="11" width="2" height="2" fill="#ff2d78"/>
  <rect x="5" y="11" width="2" height="2" fill="#ff2d78"/>

  <!-- Tail -->
  <rect x="8"  y="10" width="2" height="1" fill="#ff2d78"/>
  <rect x="9"  y="11" width="2" height="1" fill="#ff2d78"/>
  <rect x="10" y="12" width="2" height="1" fill="#ff2d78"/>
  <rect x="11" y="13" width="1" height="1" fill="#ff2d78"/>

  <!-- Eye (cyan) -->
  <rect x="4" y="5" width="1" height="1" fill="#00fff0"/>

  <!-- Beak (gold) -->
  <rect x="6" y="6" width="2" height="1" fill="#ffd700"/>
  <rect x="6" y="7" width="1" height="1" fill="#ffd700"/>

  <!-- Talons (gold) -->
  <rect x="2" y="13" width="2" height="1" fill="#ffd700"/>
  <rect x="5" y="13" width="2" height="1" fill="#ffd700"/>
</svg>
